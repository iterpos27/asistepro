services:
  - type: web
    name: asistepro-api
    env: node
    plan: free
    rootDir: .
    buildCommand: npm ci
    startCommand: npm run start
    healthCheckPath: /api/health/ready
    envVars:
      - key: NODE_ENV
        value: production
      - key: DB_SSL
        value: "true"
      - key: COOKIE_SECURE
        value: "true"
      - key: COOKIE_SAME_SITE
        value: none
      - key: RATE_LIMIT_MAX
        value: "1000"
      - key: AUTH_LOGIN_RATE_LIMIT_MAX
        value: "10"
      - key: AUTH_REGISTER_RATE_LIMIT_MAX
        value: "5"
      - key: DATABASE_URL
        sync: false
      - key: CORS_ORIGIN
        value: https://asistepro.vercel.app
      - key: FRONTEND_URL
        value: https://asistepro.vercel.app
      - key: CRON_SECRET
        generateValue: true
      - key: ALERT_WEBHOOK_URL
        sync: false
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
